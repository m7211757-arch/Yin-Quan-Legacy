<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱泉水榭·幫會傳承錄</title>
    <!-- 引入 Tailwind CSS 輕功 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Babel 翻譯官：編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Noto Serif TC 字體 (古風雅韻) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Import Map 解決模組路徑解析問題 -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #050505; color: #d4c5a1; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #331a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b0000; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 標題字距與呼吸感 - 軍師專屬比例 */
        .title-spacing { letter-spacing: 0.5em; text-indent: 0.5em; }
        .sub-spacing { letter-spacing: 1.5em; text-indent: 1.5em; }

        @media (max-width: 640px) { 
            .title-spacing { letter-spacing: 0.2em !important; text-indent: 0.2em !important; } 
            .sub-spacing { letter-spacing: 0.3em !important; text-indent: 0.3em !important; }
        }
    </style>
</head>
<body class="custom-scrollbar overflow-x-hidden">
    <div id="root"></div>

    <!-- 設置為 text/babel 並啟用 data-type="module" -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
        
        // 使用 ?external=react 確保與主程式共用同一個 React 實體，修復 Error #31
        import { 
            Plus, Edit2, Trash2, X, Ghost, Upload, PenTool, 
            BookOpen, Feather, Flame, Shield, Crosshair, History, Compass, AlertTriangle 
        } from 'https://esm.sh/lucide-react@0.284.0?external=react';

        // ==========================================
        // 【核心修正】：自動偵測環境配置，修復 API Key 錯誤
        // ==========================================
        let firebaseConfig;
        try {
            // 如果在當前環境執行，使用系統提供的變數
            firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : {
                    apiKey: "YOUR_API_KEY", // 下載至 Vercel 時請替換此處
                    authDomain: "YOUR_AUTH_DOMAIN",
                    projectId: "YOUR_PROJECT_ID",
                    storageBucket: "YOUR_STORAGE_BUCKET",
                    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
                    appId: "YOUR_APP_ID"
                };
        } catch (e) {
            console.error("配置讀取失敗");
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : "yin-quan-shui-xie"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASSES = ['碎夢', '龍吟', '血河', '神相', '九靈', '素問', '鐵衣', '玄機', '荒羽', '鴻音', '潮光'];
        const POSITIONS = ['幫眾', '堂主', '副堂主', '宴者', '雅匠', '文士', '接待', '軍師', '當家'];

        function App() {
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [expandedBatches, setExpandedBatches] = useState({});
            const [isCompressing, setIsCompressing] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '',
            });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (!currentUser) {
                        signInAnonymously(auth).catch(err => console.error("江湖阻斷:", err));
                    } else {
                        setUser(currentUser);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const collectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'members');
                const unsubscribe = onSnapshot(collectionRef, (snapshot) => {
                    const memberList = [];
                    snapshot.forEach((doc) => {
                        memberList.push({ id: doc.id, ...doc.data() });
                    });
                    memberList.sort((a, b) => (parseInt(a.batch) || 1) - (parseInt(b.batch) || 1));
                    setMembers(memberList);
                    setLoading(false);
                    
                    const initialExpanded = {};
                    memberList.forEach(m => { initialExpanded[m.batch] = true; });
                    setExpandedBatches(prev => ({ ...initialExpanded, ...prev }));
                }, (err) => {
                    console.error("讀取史冊失敗:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        setFormData(prev => ({ ...prev, imageUrl: compressedDataUrl }));
                        setIsCompressing(false);
                    };
                };
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                const collectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'members');
                try {
                    if (editingId) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'members', editingId);
                        await updateDoc(docRef, formData);
                    } else {
                        await addDoc(collectionRef, { ...formData, createdAt: new Date().toISOString() });
                    }
                    resetForm();
                } catch (error) { console.error("書寫失敗:", error); }
            };

            const executeDelete = async (id) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'members', id);
                    await deleteDoc(docRef);
                    setConfirmDeleteId(null);
                } catch (error) { console.error("抹除失敗:", error); }
            };

            const resetForm = () => {
                setFormData({ name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '' });
                setEditingId(null);
                setIsAdding(false);
            };

            const groupedMembers = useMemo(() => {
                const groups = {};
                members.forEach(m => {
                    const b = m.batch || 1;
                    if (!groups[b]) groups[b] = [];
                    groups[b].push(m);
                });
                return groups;
            }, [members]);

            if (loading) return (
                <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center text-amber-200/50">
                    <Feather size={64} className="animate-pulse text-amber-600" />
                    <p className="tracking-[0.8em] mt-8 text-sm opacity-50 uppercase font-bold text-center px-4">隱泉水榭 錄盡英雄</p>
                </div>
            );

            return (
                <div className="relative pb-40">
                    <header className="relative min-h-[75vh] flex items-center justify-center overflow-hidden border-b-2 border-amber-900/20 py-24 bg-gradient-to-b from-[#1a1612]/90 to-[#050505]">
                        <div className="relative z-20 px-4 max-w-5xl mx-auto flex flex-col items-center text-center w-full">
                            
                            {/* Logo: 置中並留白間隔 */}
                            <div className="flex justify-center mb-16">
                                <div className="relative p-6">
                                    <div className="absolute inset-0 border-2 border-amber-600/20 rotate-45" />
                                    <div className="absolute inset-0 border-2 border-amber-600/20 -rotate-45" />
                                    <BookOpen size={44} className="text-amber-500 relative z-10 animate-pulse" />
                                </div>
                            </div>
                            
                            {/* 標題：單行、字距拉開、絕對置中 */}
                            <div className="w-full flex justify-center items-center mb-12">
                                <h1 className="text-4xl md:text-6xl lg:text-7xl font-black text-amber-500 title-spacing whitespace-nowrap drop-shadow-[0_10px_40px_rgba(0,0,0,1)]">
                                    隱泉水榭·幫會傳承錄
                                </h1>
                            </div>
                            
                            <div className="flex flex-col items-center gap-12 w-full">
                                {/* 副標題 */}
                                <div className="flex items-center justify-center gap-4 md:gap-12 whitespace-nowrap w-full">
                                    <div className="hidden sm:block h-[1px] flex-1 max-w-[100px] bg-gradient-to-r from-transparent to-amber-900" />
                                    <p className="text-amber-700 font-bold text-xs md:text-lg uppercase italic sub-spacing text-center">
                                        歲 月 忽 已 晚 · 忠 義 永 留 芳
                                    </p>
                                    <div className="hidden sm:block h-[1px] flex-1 max-w-[100px] bg-gradient-to-l from-transparent to-amber-900" />
                                </div>
                                
                                {/* 軍師備註：置中 */}
                                <div className="max-w-2xl bg-amber-950/10 border-x border-amber-900/20 p-8 backdrop-blur-sm mx-auto text-center">
                                    <p className="text-amber-700/80 text-[10px] md:text-sm leading-relaxed tracking-[0.2em] italic font-serif">
                                        我們為休閒至情義幫，本譜只會依照單獨幾位老人的記憶，錄入有與幫會交流熱絡、曾共同遊玩，以及幫戰共同奮戰之人。
                                    </p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 -mt-32 relative z-30 pb-48 text-center">
                        <div className="space-y-40 inline-block w-full">
                            {Object.entries(groupedMembers).sort(([a], [b]) => parseInt(a) - parseInt(b)).map(([batch, batchMembers]) => (
                                <section key={batch} className="relative pt-48 w-full">
                                    {/* 世代印章：下調置頂高度以防與標題重疊 */}
                                    <div className="flex justify-center mb-24 sticky top-80 z-[40]">
                                        <div className="relative cursor-pointer group" onClick={() => setExpandedBatches(p => ({ ...p, [batch]: !p[batch] }))}>
                                            <div className="bg-[#6b0000] text-[#fef3c7] w-32 h-32 flex items-center justify-center rounded-sm shadow-[0_30px_60px_rgba(0,0,0,0.8)] border-[6px] border-double border-[#4a0000] transform transition-all group-hover:scale-110">
                                                <div className="text-center font-black">
                                                    <div className="text-[10px] opacity-60 tracking-[0.2em] mb-1">江湖世代</div>
                                                    <div className="text-4xl">第{batch}批</div>
                                                    <div className="text-xs opacity-80 mt-1 font-serif tracking-[0.4em]">傳承錄</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {expandedBatches[batch] && (
                                        <div className="space-y-36 relative mt-16 text-left">
                                            <div className="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-[1px] bg-gradient-to-b from-amber-900/60 via-amber-900/5 to-transparent hidden md:block" />
                                            {batchMembers.map((member, idx) => (
                                                <div key={member.id} className={`flex flex-col md:flex-row items-center md:items-start gap-16 ${idx % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} relative z-10`}>
                                                    <div className="w-full md:w-[60%] group relative">
                                                        <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-[80%] h-1 bg-amber-900/30 rounded-full blur-[1px]" />
                                                        <div className="bg-[#12100e] p-10 md:p-12 border-x border-amber-900/30 shadow-[0_50px_100px_-20px_rgba(0,0,0,0.8)] relative overflow-hidden rounded-lg">
                                                            <div className="absolute -bottom-10 -right-10 text-[10rem] opacity-[0.02] pointer-events-none font-black text-amber-500 italic select-none">{member.jobClass}</div>
                                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 border-b-2 border-amber-900/20 pb-8 relative z-10">
                                                                <div className="mb-4">
                                                                    <div className="flex items-center gap-4 mb-3">
                                                                        <h3 className="text-4xl md:text-5xl font-black text-amber-200 tracking-widest">{member.name}</h3>
                                                                        <span className="bg-[#8b0000] text-white text-[10px] px-3 py-1 font-bold tracking-[0.3em]">世代：{member.batch}</span>
                                                                    </div>
                                                                    <div className="flex flex-wrap items-center gap-6 text-amber-600 font-bold tracking-[0.3em] text-xs">
                                                                        <span className="flex items-center gap-2"><Shield size={16} />曾任：{member.position}</span>
                                                                        <span className="flex items-center gap-2"><Crosshair size={16} />流派：{member.jobClass}</span>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-4">
                                                                    <button onClick={() => { setFormData(member); setEditingId(member.id); setIsAdding(true); }} className="p-3 bg-amber-950/20 hover:bg-amber-600 rounded transition-all"><Edit2 size={20}/></button>
                                                                    <div className="relative">
                                                                        {confirmDeleteId === member.id && (
                                                                            <div className="absolute bottom-full right-0 mb-2 flex flex-col items-end gap-2 animate-in slide-in-from-bottom-2 duration-200">
                                                                                <div className="bg-[#8b0000] text-[#fef3c7] p-2 text-[10px] font-bold whitespace-nowrap border border-[#4a0000] shadow-xl">確定抹除這段記憶？</div>
                                                                                <div className="flex gap-2">
                                                                                    <button onClick={() => executeDelete(member.id)} className="bg-red-600 px-3 py-1 text-[10px] font-bold">確定</button>
                                                                                    <button onClick={() => setConfirmDeleteId(null)} className="bg-slate-800 px-3 py-1 text-[10px] font-bold">取消</button>
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                        <button onClick={() => setConfirmDeleteId(member.id)} className={`p-3 rounded transition-all ${confirmDeleteId === member.id ? 'bg-red-800' : 'bg-amber-950/20 hover:bg-red-800'}`}><Trash2 size={20}/></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div className="relative mb-12 pl-6">
                                                                <div className="absolute left-0 top-0 bottom-0 w-[2px] bg-gradient-to-b from-amber-600/50 via-transparent to-amber-600/50" />
                                                                <p className="text-amber-100/70 text-xl leading-[2.5] italic font-serif">「{member.description || '隱 世 高 人，未 曾 留 下 隻 言 片 語。'}」</p>
                                                            </div>
                                                            <div className="text-[12px] text-amber-900/60 font-black uppercase tracking-[0.5em] pt-8 border-t border-amber-900/10 flex items-center gap-2"><History size={16} /> 活躍時期：{member.period || '不詳'}</div>
                                                        </div>
                                                        <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-[80%] h-1 bg-amber-900/30 rounded-full blur-[1px]" />
                                                    </div>
                                                    <div className="w-full md:w-[30%] mt-12 md:mt-20">
                                                        <div className="aspect-[3/4] bg-black border-[16px] border-[#1a1612] shadow-2xl relative overflow-hidden rounded-sm group/img">
                                                            {member.imageUrl ? <img src={member.imageUrl} className="w-full h-full object-cover opacity-30 grayscale group-hover/img:grayscale-0 group-hover/img:opacity-100 transition-all duration-700 scale-110 group-hover/img:scale-100" alt={member.name} /> : <div className="w-full h-full flex flex-col items-center justify-center opacity-10"><Ghost size={100} /><span className="text-sm tracking-[1em] mt-4 text-center">影跡全無</span></div>}
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-90" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            ))}
                        </div>
                        <button onClick={() => setIsAdding(true)} className="fixed bottom-20 right-20 w-24 h-24 md:w-28 md:h-28 bg-[#0b2b1d] border-4 border-emerald-900 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-[100] group"><div className="text-center flex flex-col items-center"><Plus size={36} className="group-hover:rotate-180 transition-transform duration-500" /><div className="text-[10px] font-black tracking-[0.5em] uppercase mt-1 text-emerald-100">錄入</div></div></button>
                    </main>

                    {/* Editor Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/98 backdrop-blur-2xl">
                            <div className="bg-[#12100e] border-[3px] border-amber-900/40 w-full max-w-4xl shadow-2xl rounded-sm p-8 md:p-16 max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-12 border-b-2 border-amber-900/30 pb-8">
                                    <h2 className="text-3xl md:text-5xl font-black tracking-[1em] text-amber-600 uppercase flex items-center gap-6"><Compass size={40} className="animate-spin-slow" />{editingId ? '重 修 史 冊' : '新 俠 登 錄'}</h2>
                                    <button onClick={resetForm} className="text-amber-900 hover:text-amber-500 transition-all hover:rotate-90 duration-300"><X size={48} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-12">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                        <div className="space-y-4">
                                            <label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">俠 客 名 諱</label>
                                            <input required className="w-full bg-transparent border-b-2 border-amber-900/20 p-4 text-3xl outline-none focus:border-amber-600 text-amber-100" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">所 屬 流 派</label>
                                            <select className="w-full bg-black/40 border-b-2 border-amber-900/20 p-4 text-2xl outline-none focus:border-amber-600 cursor-pointer text-amber-100" value={formData.jobClass} onChange={e => setFormData({...formData, jobClass: e.target.value})}>{CLASSES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black block text-center sm:text-left">江 湖 畫 像 (本地或網址)</label>
                                        <div className="flex flex-col md:flex-row gap-6 p-4 border border-amber-900/10">
                                            <input placeholder="外部畫像網址..." className="flex-1 bg-transparent border-b border-amber-900/10 p-2 text-sm italic text-amber-100" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} />
                                            <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} />
                                            <button type="button" onClick={() => fileInputRef.current.click()} className="px-8 py-3 border-2 border-amber-900/40 text-xs font-black uppercase hover:bg-amber-900/20 transition-all text-amber-600">{isCompressing ? '凝氣中...' : '選取本地畫像'}</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                        <div className="space-y-4"><label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">傳 承 代 數</label><input type="number" min="1" className="w-full bg-transparent border-b-2 border-amber-900/20 p-4 text-3xl outline-none focus:border-amber-600 text-amber-100" value={formData.batch} onChange={e => setFormData({...formData, batch: parseInt(e.target.value) || 1})} /></div>
                                        <div className="space-y-4"><label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">曾 任 職 位</label><select className="w-full bg-black/40 border-b-2 border-amber-900/20 p-4 text-2xl outline-none focus:border-amber-600 cursor-pointer text-amber-100" value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})}>{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-4"><label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">活 躍 時 期</label><input className="w-full bg-transparent border-b-2 border-amber-900/20 p-4 text-2xl outline-none focus:border-amber-600 text-amber-100" value={formData.period} onChange={e => setFormData({...formData, period: e.target.value})} /></div>
                                    <div className="space-y-4"><label className="text-sm text-amber-800 uppercase tracking-[0.8em] font-black">江 湖 誌 異</label><textarea rows="5" className="w-full bg-black/30 border-2 border-amber-900/20 p-8 text-xl italic font-serif leading-relaxed outline-none focus:border-amber-600 text-amber-100" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} /></div>
                                    <button type="submit" className="w-full py-8 bg-[#6b0000] text-[#fef3c7] font-black tracking-[2em] border-4 border-double border-[#4a0000] shadow-2xl hover:bg-[#4a0000] transition-all transform hover:-translate-y-2 text-3xl uppercase text-center">落 筆 成 書</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="max-w-4xl mx-auto mt-60 px-6 pb-32 opacity-20 text-center relative z-10 w-full flex flex-col items-center">
