<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱泉水榭·幫會傳承錄</title>
    <!-- 引入江湖套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #050505; color: #fde68a; scroll-behavior: smooth; margin: 0; padding: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #78350f; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b91c1c; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .title-spacing { letter-spacing: 0.5em; text-indent: 0.5em; }
        .sub-spacing { letter-spacing: 0.8em; text-indent: 0.8em; }

        @media (max-width: 1024px) { 
            .title-spacing { letter-spacing: 0.2em !important; text-indent: 0.2em !important; } 
            .sub-spacing { letter-spacing: 0.3em !important; text-indent: 0.3em !important; }
        }
        
        .glow-text { text-shadow: 0 0 15px rgba(251, 191, 36, 0.7), 0 0 30px rgba(251, 191, 36, 0.4); }
        .card-glow { box-shadow: 0 0 30px rgba(120, 53, 15, 0.2); }
        .timeline-line { background: linear-gradient(to bottom, transparent, #78350f 15%, #78350f 85%, transparent); }

        /* 背景幻燈片圖層 */
        .bg-custom-layer {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
            filter: brightness(0.25) contrast(1.1);
            transition: opacity 2s ease-in-out;
        }

        /* 舒適度 90% 縮放 */
        .comfort-zoom {
            transform: scale(0.9);
            transform-origin: top center;
            width: 111.11%;
            margin-left: -5.55%;
        }

        /* 內容換行行距與斷字優化 */
        .description-content {
            white-space: pre-wrap;
            line-height: 1.6;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* 頂端黑色漸變淡出 */
        .header-fade-overlay {
            background: linear-gradient(to bottom, #000000 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,0.4) 85%, transparent 100%);
            pointer-events: none;
        }
        
        /* 標題寬鬆行距 */
        .wide-leading {
            line-height: 1.4 !important;
        }
    </style>
</head>
<body class="custom-scrollbar overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, query, getDocs, writeBatch, arrayUnion } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
        
        import { 
            Plus, Edit2, Trash2, X, Ghost, Upload, 
            BookOpen, Feather, Shield, Crosshair, History, Compass, AlertTriangle,
            Scroll, Landmark, Key, LogOut, Lock, User, Image as ImageIcon, Settings, RefreshCw,
            ChevronUp, ChevronDown
        } from 'https://esm.sh/lucide-react@0.284.0?external=react';

        const firebaseConfig = {
            apiKey: "AIzaSyCkb-GkyQ8vtrv2XXRNN5cZmNCc1LE2T-w",
            authDomain: "yin-quan-legacy.firebaseapp.com",
            projectId: "yin-quan-legacy",
            storageBucket: "yin-quan-legacy.firebasestorage.app",
            messagingSenderId: "458932829125",
            appId: "1:458932829125:web:9f078eb93d9e07e73029ac",
            measurementId: "G-S5X670YKCT"
        };
        
        const appId = "yin-quan-legacy"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASSES = ['碎夢', '龍吟', '血河', '神相', '九靈', '素問', '鐵衣', '玄機', '荒羽', '鴻音', '潮光'];
        const POSITIONS = ['幫眾', '堂主', '副堂主', '宴者', '雅匠', '文士', '接待', '軍師', '當家', '大當家'];
        const EVENT_TYPES = ['幫會戰鬥', '江湖盟約', '周年慶典', '勢力更迭', '成員聚首', '其他大事'];

        const toChineseNumber = (num) => {
            if (isNaN(num)) return "零";
            const dict = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
            if (num <= 10) return dict[num] || "零";
            if (num < 20) return '十' + (num % 10 === 0 ? '' : dict[num % 10]);
            const ten = Math.floor(num / 10);
            const unit = num % 10;
            return (dict[ten] || "零") + '十' + (unit === 0 ? '' : (dict[unit] || ""));
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('members');
            const [members, setMembers] = useState([]);
            const [events, setEvents] = useState([]);
            
            const [bgUrls, setBgUrls] = useState([]);
            const [bgIndex, setBgIndex] = useState(0);
            const [nextBgIndex, setNextBgIndex] = useState(0);
            
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showLogin, setShowLogin] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [expandedBatches, setExpandedBatches] = useState({});
            const [isCompressing, setIsCompressing] = useState(false);
            
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const fileInputRef = useRef(null);
            const bgInputRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '',
                date: '', eventType: '幫會戰鬥', title: ''
            });

            const isManagement = useMemo(() => user && !user.isAnonymous, [user]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        try { await signInAnonymously(auth); } catch (err) { console.error(err); }
                    } else {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const bgCol = collection(db, 'artifacts', appId, 'public', 'data', 'backgrounds');
                const unsubscribe = onSnapshot(bgCol, (snapshot) => {
                    const urls = snapshot.docs.map(d => d.data().url);
                    setBgUrls(urls);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (bgUrls.length > 1) {
                    const timer = setInterval(() => {
                        setNextBgIndex((prev) => (prev + 1) % bgUrls.length);
                        setTimeout(() => setBgIndex((prev) => (prev + 1) % bgUrls.length), 2000);
                    }, 10000);
                    return () => clearInterval(timer);
                }
            }, [bgUrls]);

            useEffect(() => {
                if (!user) return;
                const mCol = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                const eCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                
                const unsubM = onSnapshot(mCol, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    list.sort((a, b) => {
                        if (a.batch !== b.batch) return a.batch - b.batch;
                        return (a.sortOrder || 0) - (b.sortOrder || 0);
                    });
                    setMembers(list);
                    const expandMap = {};
                    list.forEach(m => { if (expandedBatches[m.batch] === undefined) expandMap[m.batch] = true; });
                    setExpandedBatches(prev => ({ ...expandMap, ...prev }));
                });
                
                const unsubE = onSnapshot(eCol, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    list.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        if (dateA.getTime() !== dateB.getTime()) return dateB - dateA;
                        return (a.sortOrder || 0) - (b.sortOrder || 0);
                    });
                    setEvents(list);
                });

                return () => { unsubM(); unsubE(); };
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, loginEmail, loginPass);
                    setShowLogin(false);
                } catch (err) { alert("身分驗證失敗。"); }
            };

            const handleLogout = async () => {
                await signOut(auth);
                window.location.reload();
            };

            const handleImageUpload = (e, target = 'member') => {
                const file = e.target.files[0];
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = target === 'bg' ? 1600 : 800;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * (MAX_WIDTH / img.width);
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        if (target === 'bg') addBackground(dataUrl);
                        else setFormData(prev => ({ ...prev, imageUrl: dataUrl }));
                        setIsCompressing(false);
                    };
                };
            };

            const addBackground = async (url) => {
                if (!isManagement) return;
                try {
                    const bgCol = collection(db, 'artifacts', appId, 'public', 'data', 'backgrounds');
                    await addDoc(bgCol, { url, createdAt: new Date().toISOString() });
                } catch (e) { alert("背景錄入失敗！"); }
            };

            const clearBackgrounds = async () => {
                if (!isManagement || !confirm("確定要重置背景嗎？")) return;
                const bgCol = collection(db, 'artifacts', appId, 'public', 'data', 'backgrounds');
                const snapshot = await getDocs(bgCol);
                const batch = writeBatch(db);
                snapshot.docs.forEach(d => batch.delete(d.ref));
                await batch.commit();
                setBgUrls([]);
            };

            // 修正版：徹底解決排序問題
            const moveItem = async (type, globalIndex, direction) => {
                if (!isManagement) return;
                const list = type === 'members' ? members : events;
                const currentItem = list[globalIndex];
                if (!currentItem) return;
                
                // 找出同組（世代或日期）的兄弟姊妹
                const groupItems = list.filter(item => {
                    return type === 'members' ? item.batch === currentItem.batch : item.date === currentItem.date;
                });
                
                const indexInGroup = groupItems.findIndex(i => i.id === currentItem.id);
                const targetInGroupIndex = indexInGroup + direction;
                
                // 修正：校準判斷邏輯，確保不再失效
                if (targetInGroupIndex < 0 || targetInGroupIndex >= groupItems.length) return;

                const itemA = groupItems[indexInGroup];
                const itemB = groupItems[targetInGroupIndex];

                // 靈力注入：若原本沒有序號，根據索引分配序號
                let orderA = itemA.sortOrder !== undefined ? itemA.sortOrder : indexInGroup;
                let orderB = itemB.sortOrder !== undefined ? itemB.sortOrder : targetInGroupIndex;

                // 若序號相同，強行拉開間距
                if (orderA === orderB) {
                    orderA = indexInGroup;
                    orderB = targetInGroupIndex;
                }

                try {
                    const batchUpdate = writeBatch(db);
                    // 核心互換法陣
                    batchUpdate.update(doc(db, 'artifacts', appId, 'public', 'data', type, itemA.id), { sortOrder: orderB });
                    batchUpdate.update(doc(db, 'artifacts', appId, 'public', 'data', type, itemB.id), { sortOrder: orderA });
                    await batchUpdate.commit();
                    console.log(`【排序】${type} 位序調整完成`);
                } catch (e) { 
                    console.error("排序法陣崩潰:", e);
                    alert("排序調整失敗"); 
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isManagement || isSaving) return;
                setIsSaving(true);
                const { id, ...dataToSave } = formData;
                try {
                    const colName = activeTab === 'members' ? 'members' : 'events';
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', colName);
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, editingId), dataToSave);
                    } else {
                        // 新錄入預設排在最後
                        await addDoc(colRef, { ...dataToSave, createdAt: new Date().toISOString(), sortOrder: Date.now() });
                    }
                    resetForm();
                } catch (err) { alert("落筆失敗！"); } finally { setIsSaving(false); }
            };

            const executeDelete = async (id) => {
                if (!isManagement) return;
                const colName = activeTab === 'members' ? 'members' : 'events';
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
                setConfirmDeleteId(null);
            };

            const resetForm = () => {
                setFormData({ name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '', date: '', eventType: '幫會戰鬥', title: '' });
                setEditingId(null); setIsAdding(false);
            };

            const sortedMembersGrouped = useMemo(() => {
                const g = {};
                members.forEach((m, idx) => {
                    const b = m.batch || 1;
                    if (!g[b]) g[b] = []; 
                    g[b].push({ ...m, globalIndex: idx });
                });
                return g;
            }, [members]);

            const sortedEventsList = useMemo(() => {
                return events.map((e, idx) => ({ ...e, globalIndex: idx }));
            }, [events]);

            if (loading) return (
                <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center text-amber-300 font-serif">
                    <Feather size={60} className="animate-pulse text-amber-500 mb-6" />
                    <p className="tracking-[1em] text-lg font-black uppercase">隱泉水榭 錄盡英雄</p>
                </div>
            );

            return (
                <div className="relative pb-40">
                    {bgUrls.length > 0 ? (
                        <>
                            <div className="bg-custom-layer" style={{ backgroundImage: `url(${bgUrls[bgIndex]})`, opacity: 1 }}></div>
                            <div className="bg-custom-layer" style={{ backgroundImage: `url(${bgUrls[nextBgIndex]})`, opacity: bgIndex === nextBgIndex ? 0 : 1 }}></div>
                        </>
                    ) : ( <div className="bg-custom-layer bg-black"></div> )}

                    <nav className="fixed top-0 left-0 right-0 z-[100] bg-black/90 backdrop-blur-md border-b border-amber-900/30 flex justify-center p-2 md:p-4 gap-2 md:gap-8">
                        <button onClick={() => { setActiveTab('members'); window.scrollTo(0,0); }} className={`flex items-center gap-2 md:gap-4 px-4 md:px-10 py-2 md:py-3 text-sm md:text-xl font-black transition-all rounded-sm border-2 ${activeTab === 'members' ? 'bg-amber-900/40 text-amber-300 border-amber-500 shadow-lg glow-text' : 'text-amber-800 border-transparent hover:text-amber-500'}`}><Scroll size={20} /> 俠客傳承</button>
                        <button onClick={() => { setActiveTab('events'); window.scrollTo(0,0); }} className={`flex items-center gap-2 md:gap-4 px-4 md:px-10 py-2 md:py-3 text-sm md:text-xl font-black transition-all rounded-sm border-2 ${activeTab === 'events' ? 'bg-amber-900/40 text-amber-300 border-amber-500 shadow-lg glow-text' : 'text-amber-800 border-transparent hover:text-amber-500'}`}><Landmark size={20} /> 大事編年</button>
                    </nav>

                    <header className="relative min-h-[65vh] md:min-h-[85vh] flex flex-col items-center justify-center overflow-hidden py-20 md:py-32 mt-12 md:mt-16 px-4">
                        <div className="absolute inset-0 header-fade-overlay z-0"></div>
                        <div className="relative z-10 flex flex-col items-center w-full max-w-[100vw]">
                            <div className="flex justify-center mb-8 md:mb-16">
                                <div className="relative p-4 md:p-8">
                                    <div className="absolute inset-0 border-2 md:border-4 border-amber-400/50 rotate-45 animate-pulse" />
                                    <div className="absolute inset-0 border-2 md:border-4 border-amber-400/50 -rotate-45 animate-pulse" />
                                    <BookOpen size={36} className="text-amber-400 relative z-10 md:w-14 md:h-14" />
                                </div>
                            </div>
                            <div className="w-full flex justify-center items-center mb-8 md:mb-12 overflow-visible">
                                <h1 className="text-4xl md:text-7xl lg:text-8xl font-black text-amber-400 title-spacing drop-shadow-[0_10px_30px_rgba(0,0,0,1)] text-center pl-[0.5em] glow-text select-none whitespace-nowrap">{activeTab === 'members' ? '隱泉水榭·幫會傳承錄' : '隱泉水榭·大事編年史'}</h1>
                            </div>
                            <div className="flex flex-col items-center gap-8 md:gap-12 w-full px-4 text-center">
                                <div className="flex items-center justify-center gap-6 md:gap-12 whitespace-nowrap w-full">
                                    <div className="hidden sm:block h-[2px] flex-1 max-w-[100px] bg-gradient-to-r from-transparent to-amber-500" />
                                    <p className="text-amber-500 font-black tracking-[0.5em] md:tracking-[1em] text-sm md:text-2xl uppercase italic sub-spacing drop-shadow-md whitespace-nowrap">{activeTab === 'members' ? '歲 月 忽 已 晚 · 忠 義 永 留 芳' : '興 衰 皆 史 冊 · 往 事 總 留 痕'}</p>
                                    <div className="hidden sm:block h-[1px] flex-1 max-w-[100px] bg-gradient-to-l from-transparent to-amber-500" />
                                </div>
                                <div className="max-w-4xl bg-black/45 border-x-2 border-amber-500/40 p-6 md:p-10 backdrop-blur-md mx-auto rounded-sm shadow-xl">
                                    <p className="text-amber-300 text-[11px] md:text-lg leading-relaxed tracking-[0.1em] font-black italic font-serif text-center">
                                        {activeTab === 'members' ? (
                                            <>歷經了閒趣、休閒至情義幫，本譜只會依照單獨數位老人的記憶，錄入曾與幫會交流熱絡、共同遊玩，以及一同參加幫戰共同奮戰之人。<br/><br/>若有誤記之介意事項，歡迎回來與我們敘舊! 當然，我們也不排斥你與我們再度踏上征程!</>
                                        ) : (
                                            "這裡記錄著總體發展，如今我們也仍舊持續前進，不斷學習新的事物。"
                                        )}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="comfort-zoom">
                        <main className="max-w-[95rem] mx-auto px-4 md:px-10 -mt-16 md:-mt-32 relative z-30 pb-40 text-center">
                            {activeTab === 'members' && (
                                <div className="space-y-24 md:space-y-48 inline-block w-full">
                                    {Object.entries(sortedMembersGrouped).sort(([a], [b]) => parseInt(a) - parseInt(b)).map(([batch, batchMembers]) => (
                                        <section key={batch} className="relative pt-12 md:pt-24 w-full">
                                            <div className="flex justify-center mb-12 md:mb-24">
                                                <div className="bg-[#8b0000] text-[#fffdeb] px-6 md:px-12 py-3 md:py-6 border-[3px] md:border-[5px] border-double border-[#600000] shadow-2xl min-w-[200px]">
                                                    <div className="text-[10px] md:text-xs opacity-90 tracking-[0.2em] font-black text-amber-200 uppercase">傳承時代</div>
                                                    <div className="text-3xl md:text-5xl font-black glow-text">第{toChineseNumber(parseInt(batch))}世代</div>
                                                </div>
                                            </div>
                                            <div className="space-y-20 md:space-y-40 text-left">
                                                {batchMembers.map((member, idxInGroup) => (
                                                    <div key={member.id} className={`flex flex-col ${idxInGroup % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} items-center md:items-start gap-10 md:gap-20`}>
                                                        <div className="w-full md:w-[65%] bg-[#14110e]/95 backdrop-blur-sm p-6 md:p-14 border-x-2 md:border-x-4 border-amber-700/30 rounded-xl card-glow relative overflow-hidden">
                                                            <div className="absolute -bottom-8 -right-8 md:-bottom-16 md:-right-16 text-[6rem] md:text-[12rem] opacity-[0.03] font-black text-amber-400 italic select-none break-all">{member.jobClass}</div>
                                                            
                                                            {isManagement && (
                                                                <div className={`absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-8 z-50`}>
                                                                    <button onClick={() => moveItem('members', member.globalIndex, -1)} className="p-2 bg-amber-900/20 hover:bg-amber-500 rounded-full text-amber-400 hover:text-black transition-all disabled:opacity-10" disabled={idxInGroup === 0}><ChevronUp size={32} /></button>
                                                                    <button onClick={() => moveItem('members', member.globalIndex, 1)} className="p-2 bg-amber-900/20 hover:bg-amber-500 rounded-full text-amber-400 hover:text-black transition-all disabled:opacity-10" disabled={idxInGroup === batchMembers.length - 1}><ChevronDown size={32} /></button>
                                                                </div>
                                                            )}

                                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 md:mb-10 border-b-2 md:border-b-4 border-amber-500/20 pb-6 md:pb-10">
                                                                <div className="w-full pr-12">
                                                                    <h3 className="text-3xl md:text-6xl font-black text-amber-50 tracking-widest glow-text mb-6 break-words wide-leading">{member.name}</h3>
                                                                    <div className="flex flex-wrap gap-6 md:gap-10 text-amber-400 font-black tracking-[0.2em] md:tracking-[0.4em] text-sm md:text-xl uppercase">
                                                                        <span className="flex items-center gap-2 text-amber-500 font-black"><Shield size={24}/>{member.position}</span>
                                                                        <span className="flex items-center gap-2 text-amber-500 font-black"><Crosshair size={24}/>{member.jobClass}</span>
                                                                    </div>
                                                                </div>
                                                                {isManagement && (
                                                                    <div className="flex gap-4 mt-6 md:mt-0">
                                                                        <button onClick={() => { setFormData(member); setEditingId(member.id); setIsAdding(true); }} className="p-2 md:p-3 bg-amber-500/10 hover:bg-amber-400 hover:text-black rounded-lg border border-amber-500/20"><Edit2 size={20}/></button>
                                                                        <div className="relative">
                                                                            {confirmDeleteId === member.id && (
                                                                                <div className="absolute bottom-full right-0 mb-4 flex flex-col items-end gap-3 animate-in slide-in-from-bottom-2 duration-200 z-[110]">
                                                                                    <div className="bg-[#c00000] text-white p-4 text-xs font-black tracking-widest whitespace-nowrap border-4 border-[#800000] shadow-3xl rounded-md">確定抹除？</div>
                                                                                    <div className="flex gap-3 mt-2"><button onClick={() => executeDelete(member.id)} className="bg-red-500 text-white px-4 py-1.5 text-[10px] font-black hover:bg-red-400">確定</button><button onClick={() => setConfirmDeleteId(null)} className="bg-slate-700 text-white px-4 py-1.5 text-[10px] font-black">取消</button></div>
                                                                                </div>
                                                                            )}
                                                                            <button onClick={() => setConfirmDeleteId(member.id)} className={`p-2 md:p-3 rounded-lg border transition-all ${confirmDeleteId === member.id ? 'bg-red-600' : 'bg-amber-500/5 hover:bg-red-600'}`}><Trash2 size={20}/></button>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <p className="text-amber-50/90 text-lg md:text-2xl italic font-serif mb-8 md:mb-12 pl-4 md:pl-10 border-l-2 md:border-l-4 border-amber-500/30 description-content pr-12">「{member.description || '隱 世 高 人，未 曾 留 下 隻 言 片 語。'}」</p>
                                                            <div className="text-xs md:text-xl text-amber-400 font-black uppercase tracking-[0.3em] md:tracking-[0.6em] flex items-center gap-3 md:gap-5 border-t md:border-t-2 border-amber-500/10 pt-6 md:pt-10"><History size={24} className="text-amber-600" /> 活躍時期：{member.period || '不詳'}</div>
                                                        </div>
                                                        <div className="w-full md:w-[35%] aspect-[3/4] bg-black border-8 md:border-[16px] border-[#1e1a16] shadow-xl overflow-hidden rounded-sm relative">
                                                            {member.imageUrl ? <img src={member.imageUrl} className="w-full h-full object-cover opacity-60 grayscale hover:grayscale-0 transition-all duration-1000" /> : <div className="h-full flex flex-col items-center justify-center text-amber-900/10"><Ghost size={80}/><span className="text-sm md:text-lg tracking-[1em] font-black uppercase">影跡全無</span></div>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'events' && (
                                <div className="relative max-w-7xl mx-auto py-12 md:py-24 px-4 md:px-8 text-left">
                                    <div className="absolute left-6 md:left-1/2 top-0 bottom-0 w-[2px] md:w-[4px] timeline-line -translate-x-1/2" />
                                    {events.length === 0 ? ( <p className="text-center text-xl md:text-3xl font-black text-amber-800 tracking-[0.5em] py-40">史 冊 空 白 · 待 君 揮 毫</p> ) : (
                                        sortedEventsList.map((ev, idx) => {
                                            const eventsOnThisDate = sortedEventsList.filter(e => e.date === ev.date);
                                            const idxInDateGroup = eventsOnThisDate.findIndex(e => e.id === ev.id);

                                            return (
                                                <div key={ev.id} className={`relative flex flex-col md:flex-row items-center justify-between mb-24 md:mb-36 w-full ${idx % 2 === 0 ? 'md:flex-row-reverse' : ''}`}>
                                                    <div className="hidden md:block w-[42%]" />
                                                    <div className="absolute left-6 md:left-1/2 -translate-x-1/2 w-8 h-8 md:w-14 md:h-14 bg-[#8b0000] border-2 md:border-4 border-amber-500 rounded-full z-10 flex items-center justify-center shadow-[0_0_20px_rgba(245,158,11,0.5)]"><Landmark size={20} className="text-amber-100 md:w-6 md:h-6" /></div>
                                                    <div className="w-full md:w-[48%] pl-16 md:pl-0">
                                                        <div className="bg-[#14110e]/95 backdrop-blur-sm p-8 md:p-12 border-x-2 md:border-x-4 border-amber-700/30 rounded-xl card-glow relative group overflow-hidden">
                                                            
                                                            {isManagement && (
                                                                <div className={`absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-6 z-50`}>
                                                                    <button 
                                                                        onClick={() => moveItem('events', ev.globalIndex, -1)} 
                                                                        className="p-1.5 bg-amber-900/20 hover:bg-amber-500 rounded-full text-amber-400 hover:text-black transition-all disabled:opacity-10"
                                                                        disabled={idxInDateGroup === 0}
                                                                    >
                                                                        <ChevronUp size={24} />
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => moveItem('events', ev.globalIndex, 1)} 
                                                                        className="p-1.5 bg-amber-900/20 hover:bg-amber-500 rounded-full text-amber-400 hover:text-black transition-all disabled:opacity-10"
                                                                        disabled={idxInDateGroup === eventsOnThisDate.length - 1}
                                                                    >
                                                                        <ChevronDown size={24} />
                                                                    </button>
                                                                </div>
                                                            )}

                                                            <div className="flex justify-between items-start mb-6 gap-4">
                                                                <span className="text-amber-500 font-black text-lg md:text-3xl tracking-[0.1em] bg-amber-950/30 px-3 md:px-6 py-1 md:py-2 border border-amber-500/20 whitespace-nowrap">{ev.date}</span>
                                                                {isManagement && (
                                                                    <div className="flex gap-4 items-center">
                                                                        <button onClick={() => { setFormData(ev); setEditingId(ev.id); setIsAdding(true); }} className="p-1 text-amber-600 hover:text-amber-400 transition-colors"><Edit2 size={20}/></button>
                                                                        <div className="relative">
                                                                            {confirmDeleteId === ev.id && (
                                                                                <div className="absolute bottom-full right-0 mb-4 flex flex-col items-end gap-2 z-[110]">
                                                                                    <div className="bg-[#c00000] text-white p-3 text-[10px] font-black border-2 border-[#800000] shadow-3xl rounded-md whitespace-nowrap">確定抹除？</div>
                                                                                    <div className="flex gap-2 mt-2"><button onClick={() => executeDelete(ev.id)} className="bg-red-500 text-white px-3 py-1 text-[8px] font-black">確定</button><button onClick={() => setConfirmDeleteId(null)} className="bg-slate-700 text-white px-3 py-1 text-[8px] font-black">取消</button></div>
                                                                                </div>
                                                                            )}
                                                                            <button onClick={() => setConfirmDeleteId(ev.id)} className={`p-1 transition-colors ${confirmDeleteId === ev.id ? 'text-red-400' : 'text-amber-900 hover:text-red-600'}`}><Trash2 size={20}/></button>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <h3 className="text-3xl md:text-5xl font-black text-amber-50 mb-4 md:mb-8 glow-text tracking-widest break-words wide-leading pr-10">{ev.title}</h3>
                                                            <span className="inline-block bg-[#600000] text-amber-100 text-[10px] md:text-xs px-4 py-1 font-bold tracking-[0.3em] mb-6 md:mb-10 uppercase font-black">{ev.eventType}</span>
                                                            <p className="text-amber-100/80 text-lg md:text-2xl font-serif italic description-content pr-10">{ev.description}</p>
                                                            {ev.imageUrl && <img src={ev.imageUrl} className="mt-8 md:mt-12 w-full h-auto max-h-[400px] object-cover rounded-sm border-2 md:border-4 border-[#1e1a16] opacity-80 shadow-2xl" />}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            )}
                        </main>

                        <footer className="max-w-[95rem] mx-auto mt-40 md:mt-72 px-4 md:px-12 pb-40 text-center relative z-10 w-full flex flex-col items-center">
                            <div className="h-[2px] md:h-[3px] w-full bg-gradient-to-r from-transparent via-amber-400/80 to-transparent mb-12 md:mb-16" />
                            <div className="w-full flex justify-center overflow-visible mb-8 md:mb-12 px-4"><p className="text-3xl md:text-5xl lg:text-6xl font-black text-amber-400 font-serif sub-spacing glow-text break-words leading-tight whitespace-nowrap">江 湖 路 遠 · 終 會 再 遇</p></div>
                            <p className="text-sm md:text-xl tracking-[0.2em] md:tracking-[0.8em] mb-8 md:mb-12 uppercase font-black text-amber-500 text-center">《隱泉水榭幫會傳承錄》· 軍師親筆 🖋️</p>
                            <div className="flex flex-col md:flex-row items-center gap-6 md:gap-10 p-6 md:p-8 border-2 border-amber-400/30 bg-amber-950/20 rounded-lg w-full max-w-fit mx-4 shadow-2xl">
                                <div className="flex items-center gap-4 md:gap-6">
                                    <div className={`w-4 h-4 md:w-5 md:h-5 rounded-full ${user ? 'bg-emerald-400 shadow-[0_0_15px_#34d399]' : 'bg-red-500 shadow-[0_0_15px_#ef4444]'}`} />
                                    <div className="text-amber-400 text-[10px] md:text-base tracking-[0.1em] font-black truncate max-w-[200px] md:max-w-none uppercase">俠客靈壓：{user ? user.uid : "尚未覺醒"}</div>
                                </div>
                                <div className="h-[1px] w-12 md:h-8 md:w-[1px] bg-amber-900/50"></div>
                                <div className="flex items-center gap-6">
                                    {isManagement ? ( <button onClick={handleLogout} className="text-red-500 hover:text-red-300 flex items-center gap-2 text-xs md:text-sm font-black tracking-widest uppercase"><LogOut size={18}/> 卸下權限</button> ) : ( <button onClick={() => setShowLogin(true)} className="text-amber-700 hover:text-amber-500 flex items-center gap-2 text-xs md:text-sm font-black tracking-widest uppercase"><Key size={18}/> 掌門印信</button> )}
                                </div>
                            </div>
                        </footer>
                    </div>

                    {isManagement && (
                        <button onClick={() => setIsAdding(true)} className="fixed bottom-10 right-6 md:bottom-20 md:right-20 w-16 h-16 md:w-32 md:h-32 bg-[#0c3b28] text-emerald-50 border-4 md:border-8 border-emerald-700 shadow-2xl flex items-center justify-center transition-all hover:scale-110 active:scale-95 z-[500] group rounded-full">
                            <div className="text-center flex flex-col items-center">
                                <Plus size={24} className="md:w-11 md:h-11 group-hover:rotate-180 transition-transform duration-700" />
                                <div className="text-[8px] md:text-[10px] font-black tracking-[0.2em] uppercase mt-1">錄入</div>
                            </div>
                        </button>
                    )}

                    {showLogin && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 md:p-8 bg-black/95 backdrop-blur-3xl text-left">
                            <div className="bg-[#1a1714] border-2 md:border-[4px] border-amber-800/40 w-full max-w-lg shadow-2xl rounded-sm p-6 md:p-12">
                                <div className="flex justify-between items-center mb-8 border-b border-amber-900/30 pb-4 text-amber-500">
                                    <h2 className="text-xl md:text-3xl font-black tracking-[0.3em] flex items-center gap-3"><Lock size={24}/> 管理山門</h2>
                                    <button onClick={() => setShowLogin(false)}><X size={24}/></button>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-6 md:space-y-10">
                                    <div className="space-y-2 md:space-y-4"><label className="text-xs md:sm text-amber-700 font-black flex items-center gap-2"><User size={14}/> 掌門密令 (Email)</label><input type="email" required className="w-full bg-black/40 border-b border-amber-900/20 p-2 md:p-4 text-lg outline-none text-amber-50" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} /></div>
                                    <div className="space-y-2 md:space-y-4"><label className="text-xs md:sm text-amber-700 font-black flex items-center gap-2"><Key size={14}/> 門派信物 (密碼)</label><input type="password" required className="w-full bg-black/40 border-b border-amber-900/20 p-2 md:p-4 text-lg outline-none text-amber-50" value={loginPass} onChange={e => setLoginPass(e.target.value)} /></div>
                                    <button type="submit" className="w-full py-4 md:py-6 bg-amber-900/40 text-amber-300 font-black border border-amber-700 hover:bg-amber-700 hover:text-white transition-all uppercase">喚醒權限</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isAdding && isManagement && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-2 md:p-8 bg-black/98 backdrop-blur-3xl text-left">
                            <div className="bg-[#1e1b18] border-2 md:border-[5px] border-amber-500/40 w-full max-w-5xl shadow-[0_0_150px_rgba(0,0,0,1)] rounded-sm p-6 md:p-16 max-h-[95vh] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-8 border-b-2 border-amber-500/30 pb-6 text-amber-400">
                                    <h2 className="text-xl md:text-6xl font-black tracking-[0.2em] md:tracking-[1em] uppercase flex items-center gap-4"><Compass size={24} className="md:w-14 md:h-14 animate-spin-slow" />{editingId ? '重 修 史 冊' : '幫 友 登 錄'}</h2>
                                    <button onClick={resetForm} className="hover:text-white transition-all hover:rotate-90 duration-500"><X size={32} /></button>
                                </div>
                                <div className="mb-12 p-6 border-2 border-amber-900/30 bg-black/20 rounded-xl">
                                    <label className="text-sm text-amber-50 uppercase tracking-[0.2em] font-black flex items-center gap-3 mb-6"><ImageIcon size={20}/> 幻化江山 (背景幻燈片)</label>
                                    <div className="flex flex-col md:flex-row gap-6 items-center">
                                        <div className="flex-1 w-full text-xs text-amber-700 italic">目前已有 {bgUrls.length} 張風景。不限數量，系統會自動輪換。</div>
                                        <div className="flex gap-4"><input type="file" accept="image/*" className="hidden" ref={bgInputRef} onChange={(e) => handleImageUpload(e, 'bg')} /><button type="button" onClick={() => bgInputRef.current?.click()} className="px-6 py-3 border-2 border-amber-500/40 text-xs font-black text-amber-400 flex items-center gap-2"><Plus size={16}/> 增加風景</button><button type="button" onClick={clearBackgrounds} className="px-6 py-3 border-2 border-red-900/40 text-xs font-black text-red-400 flex items-center gap-2"><RefreshCw size={16}/> 重置</button></div>
                                    </div>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-8 md:space-y-12">
                                    {activeTab === 'members' ? (
                                        <><div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12"><div className="space-y-2"><label className="text-xs text-amber-50 font-black">俠 客 名 諱</label><input required className="w-full bg-transparent border-b border-amber-500/20 p-2 md:p-4 text-xl md:text-3xl outline-none text-amber-100" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div><div className="space-y-2"><label className="text-xs text-amber-50 font-black">所 屬 流 派</label><select className="w-full bg-black/60 border-b border-amber-500/20 p-2 md:p-4 text-lg md:text-2xl outline-none text-amber-100" value={formData.jobClass} onChange={e => setFormData({...formData, jobClass: e.target.value})}>{CLASSES.map(c => <option key={c} value={c}>{c}</option>)}</select></div></div><div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12"><div className="space-y-2"><label className="text-xs text-amber-50 font-black">傳 承 世 代 (數字)</label><input type="number" className="w-full bg-transparent border-b border-amber-500/20 p-2 md:p-4 text-xl md:text-3xl outline-none text-amber-100" value={formData.batch} onChange={e => setFormData({...formData, batch: parseInt(e.target.value)||1})} /></div><div className="space-y-2"><label className="text-xs text-amber-50 font-black">曾 任 職 位</label><select className="w-full bg-black/60 border-b border-amber-500/20 p-2 md:p-4 text-lg md:text-2xl outline-none text-amber-100" value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})}>{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}</select></div></div><div className="space-y-2"><label className="text-xs text-amber-50 font-black">活 躍 時 期</label><input className="w-full bg-transparent border-b border-amber-500/20 p-2 md:p-4 text-xl md:text-3xl outline-none text-amber-100" value={formData.period} onChange={e => setFormData({...formData, period: e.target.value})} /></div></>
                                    ) : (
                                        <><div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12"><div className="space-y-2"><label className="text-xs text-amber-50 font-black">事 件 標 題</label><input required className="w-full bg-transparent border-b border-amber-500/20 p-2 md:p-4 text-xl md:text-3xl outline-none focus:border-amber-400 text-amber-100" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} /></div><div className="space-y-2"><label className="text-xs text-amber-50 font-black">事 件 日 期 (例: 2024.01.01)</label><input required className="w-full bg-transparent border-b border-amber-500/20 p-2 md:p-4 text-xl md:text-3xl outline-none text-amber-100" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div></div><div className="space-y-2"><label className="text-xs text-amber-50 font-black">事 件 類 型</label><select className="w-full bg-black/60 border-b border-amber-500/20 p-2 md:p-4 text-lg md:text-2xl outline-none text-amber-100" value={formData.eventType} onChange={e => setFormData({...formData, eventType: e.target.value})}>{EVENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div></>
                                    )}
                                    <div className="space-y-4"><label className="text-xs text-amber-50 font-black block">畫 像 網 址 / 上 傳</label><div className="flex flex-col md:flex-row gap-4 p-4 border border-amber-500/20 bg-black/40 rounded-xl"><input placeholder="外部畫像網址..." className="flex-1 bg-transparent border-b border-amber-500/20 p-2 text-sm italic text-amber-100 outline-none" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} /><input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} /><button type="button" onClick={() => fileInputRef.current?.click()} className="px-6 py-3 border border-amber-500/40 text-xs font-black uppercase text-amber-400">{isCompressing ? '凝氣中...' : '選取本地畫像'}</button></div></div>
                                    <div className="space-y-4"><label className="text-xs text-amber-50 font-black">誌 異 / 詳 情</label><textarea rows="5" className="w-full bg-black/50 border border-amber-500/20 p-4 md:p-8 text-lg md:text-xl italic font-serif outline-none text-amber-100" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} /></div>
                                    <button type="submit" disabled={isSaving} className={`w-full py-4 md:py-8 bg-[#a00000] text-[#fff6d1] font-black border-4 md:border-6 border-double border-[#700000] shadow-2xl transition-all transform text-xl md:text-3xl uppercase ${isSaving ? 'opacity-50' : 'hover:bg-[#800000] hover:-translate-y-2'}`}>{isSaving ? '凝 氣 成 書...' : '落 筆 成 書'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
