<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱泉水榭·幫會傳承錄</title>
    <!-- 引入江湖套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #050505; color: #d4c5a1; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a2b16; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #8b0000; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 標題字距校準 */
        .title-spacing { letter-spacing: 0.6em; text-indent: 0.6em; }
        .sub-spacing { letter-spacing: 1.6em; text-indent: 1.6em; }

        @media (max-width: 640px) { 
            .title-spacing { letter-spacing: 0.3em !important; text-indent: 0.3em !important; } 
            .sub-spacing { letter-spacing: 0.5em !important; text-indent: 0.5em !important; }
        }
    </style>
</head>
<body class="custom-scrollbar overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
        
        import { 
            Plus, Edit2, Trash2, X, Ghost, Upload, 
            BookOpen, Feather, Shield, Crosshair, History, Compass, AlertTriangle 
        } from 'https://esm.sh/lucide-react@0.284.0?external=react';

        // ==========================================
        // 【靈脈核心】初始化
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCkb-GkyQ8vtrv2XXRNN5cZmNCc1LE2T-w",
                authDomain: "yin-quan-legacy.firebaseapp.com",
                projectId: "yin-quan-legacy",
                storageBucket: "yin-quan-legacy.firebasestorage.app",
                messagingSenderId: "458932829125",
                appId: "1:458932829125:web:9f078eb93d9e07e73029ac",
                measurementId: "G-S5X670YKCT"
            };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : "yin-quan-legacy"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASSES = ['碎夢', '龍吟', '血河', '神相', '九靈', '素問', '鐵衣', '玄機', '荒羽', '鴻音', '潮光'];
        const POSITIONS = ['幫眾', '堂主', '副堂主', '宴者', '雅匠', '文士', '接待', '軍師', '當家'];

        function App() {
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [expandedBatches, setExpandedBatches] = useState({});
            const [isCompressing, setIsCompressing] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '',
            });

            // 認證流程
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("認證失敗:", err);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // 數據同步
            useEffect(() => {
                if (!user) return;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                const unsubscribe = onSnapshot(colRef, 
                    (snapshot) => {
                        const list = [];
                        snapshot.forEach((d) => list.push({ id: d.id, ...d.data() }));
                        list.sort((a, b) => (parseInt(a.batch) || 1) - (parseInt(b.batch) || 1));
                        setMembers(list);
                        setLoading(false);
                        const expandMap = {};
                        list.forEach(m => { if (expandedBatches[m.batch] === undefined) expandMap[m.batch] = true; });
                        setExpandedBatches(prev => ({ ...expandMap, ...prev }));
                    }, 
                    (err) => {
                        console.error("讀取失敗:", err);
                        setLoading(false);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        setFormData(prev => ({ ...prev, imageUrl: canvas.toDataURL('image/jpeg', 0.6) }));
                        setIsCompressing(false);
                    };
                };
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSaving) return;
                let activeUser = auth.currentUser;
                if (!activeUser) {
                    try {
                        const result = await signInAnonymously(auth);
                        activeUser = result.user;
                        setUser(activeUser);
                    } catch (err) {
                        alert("靈脈未通，請確認認證。");
                        return;
                    }
                }
                setIsSaving(true);
                const { id, ...dataToSave } = formData;
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                    if (editingId) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', editingId);
                        await updateDoc(docRef, dataToSave);
                    } else {
                        await addDoc(colRef, { ...dataToSave, createdAt: new Date().toISOString() });
                    }
                    resetForm();
                } catch (err) {
                    alert("落筆失敗！");
                } finally { setIsSaving(false); }
            };

            const executeDelete = async (id) => {
                if (!auth.currentUser) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', id);
                    await deleteDoc(docRef);
                    setConfirmDeleteId(null);
                } catch (e) { alert("抹除失敗"); }
            };

            const resetForm = () => {
                setFormData({ name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '' });
                setEditingId(null);
                setIsAdding(false);
            };

            const groupedMembers = useMemo(() => {
                const g = {};
                members.forEach(m => {
                    if (!g[m.batch]) g[m.batch] = [];
                    g[m.batch].push(m);
                });
                return g;
            }, [members]);

            if (loading) return (
                <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center text-amber-300 font-serif">
                    <Feather size={80} className="animate-pulse text-amber-500 mb-8" />
                    <p className="tracking-[1em] text-lg opacity-80 font-bold uppercase">隱泉水榭 錄盡英雄</p>
                </div>
            );

            return (
                <div className="relative pb-40">
                    {/* Header - 強化對比與字級 */}
                    <header className="relative min-h-[85vh] flex flex-col items-center justify-center overflow-hidden border-b-2 border-amber-800/30 py-24 bg-gradient-to-b from-[#1c1814] to-[#050505]">
                        <div className="flex justify-center mb-24">
                            <div className="relative p-8">
                                <div className="absolute inset-0 border-2 border-amber-500/40 rotate-45" />
                                <div className="absolute inset-0 border-2 border-amber-500/40 -rotate-45" />
                                <BookOpen size={56} className="text-amber-500 relative z-10 animate-pulse" />
                            </div>
                        </div>
                        <h1 className="text-5xl md:text-7xl lg:text-8xl font-black text-amber-500 title-spacing whitespace-nowrap drop-shadow-[0_15px_50px_rgba(0,0,0,1)] text-center pl-[0.6em] mb-16">
                            隱泉水榭·幫會傳承錄
                        </h1>
                        <div className="flex flex-col items-center gap-12 w-full px-6 text-center">
                            <div className="flex items-center justify-center gap-6 md:gap-16 whitespace-nowrap w-full">
                                <div className="hidden sm:block h-[1px] flex-1 max-w-[120px] bg-gradient-to-r from-transparent to-amber-700" />
                                <p className="text-amber-600 font-black tracking-[1.6em] text-base md:text-2xl uppercase italic sub-spacing pl-[1.6em]">歲 月 忽 已 晚 · 忠 義 永 留 芳</p>
                                <div className="hidden sm:block h-[1px] flex-1 max-w-[120px] bg-gradient-to-l from-transparent to-amber-700" />
                            </div>
                            <div className="max-w-3xl bg-amber-950/20 border-x-2 border-amber-800/30 p-10 backdrop-blur-md mx-auto rounded-sm">
                                <p className="text-amber-400/90 text-sm md:text-lg leading-relaxed tracking-[0.25em] italic font-serif">我們為休閒至情義幫，本譜只會依照單獨幾位老人的記憶，錄入有與幫會交流熱絡、曾共同遊玩，以及幫戰共同奮戰之人。</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-8 -mt-40 relative z-30 pb-48 text-center">
                        <div className="space-y-48 inline-block w-full">
                            {Object.entries(groupedMembers).sort(([a], [b]) => parseInt(a) - parseInt(b)).map(([batch, batchMembers]) => (
                                <section key={batch} className="relative pt-24 w-full text-center">
                                    <div className="flex justify-center mb-28 relative z-[40]">
                                        <div className="relative cursor-pointer group" onClick={() => setExpandedBatches(p => ({ ...p, [batch]: !p[batch] }))}>
                                            <div className="bg-[#8b0000] text-[#fff6d1] w-40 h-40 flex items-center justify-center rounded-sm shadow-[0_40px_80px_rgba(0,0,0,0.9)] border-[8px] border-double border-[#5a0000] transform transition-all group-hover:scale-110">
                                                <div className="text-center font-black">
                                                    <div className="text-xs opacity-80 tracking-[0.3em] mb-2 uppercase font-bold">江湖世代</div>
                                                    <div className="text-5xl">第{batch}批</div>
                                                    <div className="text-sm opacity-90 mt-2 font-serif tracking-[0.5em]">傳承錄</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    {expandedBatches[batch] && (
                                        <div className="space-y-40 relative mt-20 text-left">
                                            <div className="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-[2px] bg-gradient-to-b from-amber-800/40 via-amber-900/5 to-transparent hidden md:block" />
                                            {batchMembers.map((member, idx) => (
                                                <div key={member.id} className={`flex flex-col md:flex-row items-center md:items-start gap-20 ${idx % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} relative z-10`}>
                                                    <div className="w-full md:w-[65%] group relative">
                                                        <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-[85%] h-[2px] bg-amber-800/40 rounded-full blur-[1px]" />
                                                        <div className="bg-[#141210] p-12 md:p-16 border-x-2 border-amber-900/40 shadow-2xl relative overflow-hidden rounded-lg group-hover:border-amber-500/50 transition-all duration-700">
                                                            <div className="absolute -bottom-12 -right-12 text-[12rem] opacity-[0.03] pointer-events-none font-black text-amber-500 italic select-none">{member.jobClass}</div>
                                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 border-b-2 border-amber-900/30 pb-10 relative z-10">
                                                                <div className="mb-6 md:mb-0">
                                                                    <div className="flex items-center gap-6 mb-4">
                                                                        <h3 className="text-5xl md:text-6xl font-black text-amber-100 tracking-widest drop-shadow-lg">{member.name}</h3>
                                                                        <span className="bg-[#a00000] text-white text-xs px-4 py-1.5 font-bold tracking-[0.4em] shadow-md">世代：{member.batch}</span>
                                                                    </div>
                                                                    <div className="flex flex-wrap items-center gap-8 text-amber-500 font-black tracking-[0.4em] text-sm uppercase">
                                                                        <span className="flex items-center gap-3"><Shield size={20} className="text-amber-700" />曾任：{member.position}</span>
                                                                        <span className="flex items-center gap-3"><Crosshair size={20} className="text-amber-700" />流派：{member.jobClass}</span>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-6">
                                                                    <button onClick={() => { setFormData(member); setEditingId(member.id); setIsAdding(true); }} className="p-4 bg-amber-900/20 hover:bg-amber-500 hover:text-white rounded-md transition-all shadow-inner border border-amber-800/20"><Edit2 size={24}/></button>
                                                                    <div className="relative">
                                                                        {confirmDeleteId === member.id && (
                                                                            <div className="absolute bottom-full right-0 mb-3 flex flex-col items-end gap-3 animate-in slide-in-from-bottom-2 duration-200">
                                                                                <div className="bg-[#a00000] text-[#fff6d1] p-3 text-xs font-black tracking-widest whitespace-nowrap border border-[#5a0000] shadow-2xl rounded-sm">確定抹除這段記憶？</div>
                                                                                <div className="flex gap-3">
                                                                                    <button onClick={() => executeDelete(member.id)} className="bg-red-600 text-white px-5 py-2 text-xs font-black hover:bg-red-700 transition-colors shadow-lg">確定</button>
                                                                                    <button onClick={() => setConfirmDeleteId(null)} className="bg-slate-700 text-white px-5 py-2 text-xs font-black hover:bg-slate-800 transition-colors shadow-lg">取消</button>
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                        <button onClick={() => setConfirmDeleteId(member.id)} className={`p-4 rounded-md transition-all border border-transparent ${confirmDeleteId === member.id ? 'bg-red-800 text-white' : 'bg-amber-900/20 hover:bg-red-700 hover:text-white'}`}><Trash2 size={24}/></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div className="relative mb-14 pl-10">
                                                                <div className="absolute left-0 top-0 bottom-0 w-[3px] bg-gradient-to-b from-amber-600 via-transparent to-amber-600 opacity-40" />
                                                                <p className="text-amber-50/90 text-2xl md:text-3xl leading-[2.8] italic font-serif tracking-wide drop-shadow-sm">「{member.description || '隱 世 高 人，未 曾 留 下 隻 言 片 語。'}」</p>
                                                            </div>
                                                            <div className="text-[14px] text-amber-500/80 font-black uppercase tracking-[0.6em] pt-10 border-t border-amber-900/20 flex items-center gap-4"><History size={20} className="text-amber-700" /> 活躍時期：{member.period || '不詳'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="w-full md:w-[35%] mt-12 md:mt-24">
                                                        <div className="aspect-[3/4] bg-black border-[20px] border-[#1e1a16] shadow-[0_60px_120px_-30px_rgba(0,0,0,1)] relative overflow-hidden rounded-sm group/img">
                                                            {member.imageUrl ? <img src={member.imageUrl} className="w-full h-full object-cover opacity-40 grayscale group-hover/img:grayscale-0 group-hover/img:opacity-100 transition-all duration-1000 scale-110 group-hover/img:scale-100" alt={member.name} /> : <div className="w-full h-full flex flex-col items-center justify-center text-amber-900/10"><Ghost size={120} className="mb-10 opacity-30" /><span className="text-lg tracking-[1.5em] font-black uppercase text-center px-4">影跡全無</span></div>}
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-90" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            ))}
                        </div>
                        <button onClick={() => setIsAdding(true)} className="fixed bottom-24 right-24 w-28 h-28 md:w-32 md:h-32 bg-[#0d3b28] text-emerald-50 border-4 border-emerald-800 shadow-[0_30px_80px_rgba(0,50,20,0.8)] flex items-center justify-center transition-all hover:scale-110 active:scale-95 z-[100] group rounded-full"><div className="text-center flex flex-col items-center"><Plus size={44} className="group-hover:rotate-180 transition-transform duration-700" /><div className="text-xs font-black tracking-[0.6em] uppercase mt-2">錄入</div></div></button>
                    </main>

                    {/* Modal - 更加明亮且字體大 */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/95 backdrop-blur-2xl text-left">
                            <div className="bg-[#1a1714] border-[4px] border-amber-800/40 w-full max-w-5xl shadow-[0_0_150px_rgba(0,0,0,1)] rounded-sm p-12 md:p-20 max-h-[90vh] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-16 border-b-2 border-amber-800/30 pb-12">
                                    <h2 className="text-4xl md:text-6xl font-black tracking-[1em] text-amber-500 uppercase flex items-center gap-10"><Compass size={56} className="animate-spin-slow" />{editingId ? '重 修 史 冊' : '新 俠 登 錄'}</h2>
                                    <button onClick={resetForm} className="text-amber-800 hover:text-amber-500 transition-all hover:rotate-90 duration-500"><X size={64} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-16">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                        <div className="space-y-6"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">俠 客 名 諱</label><input required className="w-full bg-transparent border-b-2 border-amber-900/30 p-6 text-4xl outline-none focus:border-amber-500 text-amber-50" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                        <div className="space-y-6"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">所 屬 流 派</label><select className="w-full bg-black/50 border-b-2 border-amber-900/30 p-6 text-3xl outline-none focus:border-amber-500 cursor-pointer text-amber-50 font-bold" value={formData.jobClass} onChange={e => setFormData({...formData, jobClass: e.target.value})}>{CLASSES.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-8"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black block text-center sm:text-left font-bold">江 湖 畫 像 (本地畫像)</label><div className="flex flex-col md:flex-row gap-10 p-6 border-2 border-amber-900/20 bg-black/30 rounded-md"><input placeholder="外部畫像網址..." className="flex-1 bg-transparent border-b border-amber-800/20 p-4 text-lg italic text-amber-200/50 outline-none" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} /><input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} /><button type="button" onClick={() => fileInputRef.current?.click()} className="px-12 py-5 border-2 border-amber-700/40 text-base font-black uppercase hover:bg-amber-900/30 transition-all text-amber-500 font-bold">{isCompressing ? '凝氣中...' : '選取本地畫像'}</button></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                        <div className="space-y-6"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">傳 承 代 數</label><input type="number" min="1" className="w-full bg-transparent border-b-2 border-amber-900/30 p-6 text-4xl outline-none focus:border-amber-500 text-amber-50 font-bold" value={formData.batch} onChange={e => setFormData({...formData, batch: parseInt(e.target.value) || 1})} /></div>
                                        <div className="space-y-6"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">曾 任 職 位</label><select className="w-full bg-black/50 border-b-2 border-amber-900/30 p-6 text-3xl outline-none focus:border-amber-500 cursor-pointer text-amber-50 font-bold" value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})}>{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-6"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">活 躍 時 期</label><input className="w-full bg-transparent border-b-2 border-amber-900/30 p-6 text-3xl outline-none focus:border-amber-500 text-amber-50 font-bold" value={formData.period} onChange={e => setFormData({...formData, period: e.target.value})} /></div>
                                    <div className="space-y-8"><label className="text-base text-amber-700 uppercase tracking-[1em] font-black font-bold">江 湖 誌 異</label><textarea rows="6" className="w-full bg-black/40 border-2 border-amber-900/30 p-10 text-2xl italic font-serif leading-[2.5] outline-none focus:border-amber-500 text-amber-50 shadow-inner rounded-sm" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} /></div>
                                    <button 
                                        type="submit" 
                                        disabled={isSaving}
                                        className={`w-full py-10 bg-[#8b0000] text-[#fff6d1] font-black tracking-[2.5em] border-4 border-double border-[#5a0000] shadow-[0_30px_70px_rgba(0,0,0,0.6)] transition-all transform text-4xl uppercase text-center ${isSaving ? 'opacity-50 cursor-not-allowed' : 'hover:bg-[#5a0000] hover:-translate-y-2'}`}
                                    >
                                        {isSaving ? '凝 氣 成 書...' : '落 筆 成 書'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Footer - 徹底解決「暗到看不見」 */}
                    <footer className="max-w-5xl mx-auto mt-72 px-8 pb-40 text-center relative z-10 w-full flex flex-col items-center">
                        <div className="h-[3px] w-full bg-gradient-to-r from-transparent via-amber-800/50 to-transparent mb-16" />
                        <p className="text-2xl md:text-3xl font-black text-amber-500 font-serif text-center w-full sub-spacing pl-[1.6em] mb-10 drop-shadow-md">江 湖 路 遠 · 終 會 在 遇</p>
                        <p className="text-base md:text-xl tracking-[0.8em] mb-4 uppercase font-bold text-amber-600/90 text-center w-full pl-[0.8em]">《隱泉水榭幫會傳承錄》· 軍師親筆 🖋️</p>
                        <p className="text-sm md:text-base tracking-[0.4em] opacity-80 italic text-amber-700 text-center w-full block mb-12">自古英雄如美人 · 不許人間見白頭</p>
                        
                        <div className="flex items-center gap-6 p-6 border-2 border-amber-900/30 bg-amber-950/10 rounded-sm">
                            <div className={`w-4 h-4 rounded-full ${user ? 'bg-emerald-500 shadow-[0_0_15px_#10b981]' : 'bg-red-600 shadow-[0_0_15px_#dc2626]'}`} />
                            <div className="text-amber-600 text-xs md:text-sm tracking-[0.4em] uppercase font-black">
                                俠客靈壓：{user ? user.uid : "靈脈尚未覺醒"}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
