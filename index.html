<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隱泉水榭·幫會傳承錄</title>
    <!-- 引入江湖套件 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
    </script>

    <style>
        body { font-family: 'Noto Serif TC', serif; background-color: #050505; color: #fde68a; scroll-behavior: smooth; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050505; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #78350f; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b91c1c; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 標題字距與震懾力 - 改為相對單位以防斷行 */
        .title-spacing { letter-spacing: 0.8em; text-indent: 0.8em; }
        .sub-spacing { letter-spacing: 1.5em; text-indent: 1.5em; }

        @media (max-width: 1024px) { 
            .title-spacing { letter-spacing: 0.3em !important; text-indent: 0.3em !important; } 
            .sub-spacing { letter-spacing: 0.5em !important; text-indent: 0.5em !important; }
        }
        
        .glow-text { text-shadow: 0 0 20px rgba(245, 158, 11, 0.6), 0 0 40px rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body class="custom-scrollbar overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
        
        import { 
            Plus, Edit2, Trash2, X, Ghost, Upload, 
            BookOpen, Feather, Shield, Crosshair, History, Compass, AlertTriangle 
        } from 'https://esm.sh/lucide-react@0.284.0?external=react';

        // ==========================================
        // 【靈脈核心】
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCkb-GkyQ8vtrv2XXRNN5cZmNCc1LE2T-w",
                authDomain: "yin-quan-legacy.firebaseapp.com",
                projectId: "yin-quan-legacy",
                storageBucket: "yin-quan-legacy.firebasestorage.app",
                messagingSenderId: "458932829125",
                appId: "1:458932829125:web:9f078eb93d9e07e73029ac",
                measurementId: "G-S5X670YKCT"
            };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : "yin-quan-legacy"; 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLASSES = ['碎夢', '龍吟', '血河', '神相', '九靈', '素問', '鐵衣', '玄機', '荒羽', '鴻音', '潮光'];
        const POSITIONS = ['幫眾', '堂主', '副堂主', '宴者', '雅匠', '文士', '接待', '軍師', '當家'];

        function App() {
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [expandedBatches, setExpandedBatches] = useState({});
            const [isCompressing, setIsCompressing] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({
                name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '',
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("認證失敗:", err);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                const unsubscribe = onSnapshot(colRef, 
                    (snapshot) => {
                        const list = [];
                        snapshot.forEach((d) => list.push({ id: d.id, ...d.data() }));
                        list.sort((a, b) => (parseInt(a.batch) || 1) - (parseInt(b.batch) || 1));
                        setMembers(list);
                        setLoading(false);
                        const expandMap = {};
                        list.forEach(m => { if (expandedBatches[m.batch] === undefined) expandMap[m.batch] = true; });
                        setExpandedBatches(prev => ({ ...expandMap, ...prev }));
                    }, 
                    (err) => {
                        console.error("讀取失敗:", err);
                        setLoading(false);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsCompressing(true);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        setFormData(prev => ({ ...prev, imageUrl: canvas.toDataURL('image/jpeg', 0.6) }));
                        setIsCompressing(false);
                    };
                };
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSaving) return;
                let activeUser = auth.currentUser;
                if (!activeUser) {
                    try {
                        const result = await signInAnonymously(auth);
                        activeUser = result.user;
                        setUser(activeUser);
                    } catch (err) {
                        alert("靈脈未通，請確認認證。");
                        return;
                    }
                }
                setIsSaving(true);
                const { id, ...dataToSave } = formData;
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                    if (editingId) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', editingId);
                        await updateDoc(docRef, dataToSave);
                    } else {
                        await addDoc(colRef, { ...dataToSave, createdAt: new Date().toISOString() });
                    }
                    resetForm();
                } catch (err) {
                    alert("落筆失敗！");
                } finally { setIsSaving(false); }
            };

            const executeDelete = async (id) => {
                if (!auth.currentUser) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', id);
                    await deleteDoc(docRef);
                    setConfirmDeleteId(null);
                } catch (e) { alert("抹除失敗"); }
            };

            const resetForm = () => {
                setFormData({ name: '', period: '', imageUrl: '', jobClass: '碎夢', batch: 1, position: '幫眾', description: '' });
                setEditingId(null);
                setIsAdding(false);
            };

            const groupedMembers = useMemo(() => {
                const g = {};
                members.forEach(m => {
                    if (!g[m.batch]) g[m.batch] = [];
                    g[m.batch].push(m);
                });
                return g;
            }, [members]);

            if (loading) return (
                <div className="min-h-screen bg-[#050505] flex flex-col items-center justify-center text-amber-300 font-serif">
                    <Feather size={100} className="animate-pulse text-amber-500 mb-12" />
                    <p className="tracking-[1.5em] text-2xl font-black uppercase glow-text">隱泉水榭 錄盡英雄</p>
                </div>
            );

            return (
                <div className="relative pb-60">
                    {/* Header - 超大標與極致光澤 */}
                    <header className="relative min-h-screen flex flex-col items-center justify-center overflow-hidden border-b-4 border-amber-500/20 py-32 bg-gradient-to-b from-[#2a221a] to-[#050505]">
                        <div className="flex justify-center mb-32">
                            <div className="relative p-12">
                                <div className="absolute inset-0 border-4 border-amber-400/50 rotate-45 animate-pulse" />
                                <div className="absolute inset-0 border-4 border-amber-400/50 -rotate-45 animate-pulse" />
                                <BookOpen size={80} className="text-amber-400 relative z-10" />
                            </div>
                        </div>
                        
                        <h1 className="text-6xl md:text-8xl lg:text-[11rem] font-black text-amber-400 title-spacing whitespace-nowrap drop-shadow-[0_20px_60px_rgba(0,0,0,1)] text-center pl-[0.8em] mb-20 glow-text select-none">
                            隱泉水榭·幫會傳承錄
                        </h1>
                        
                        <div className="flex flex-col items-center gap-16 w-full px-8 text-center">
                            <div className="flex items-center justify-center gap-10 md:gap-24 whitespace-nowrap w-full">
                                <div className="hidden sm:block h-[2px] flex-1 max-w-[200px] bg-gradient-to-r from-transparent to-amber-500" />
                                <p className="text-amber-500 font-black tracking-[1.5em] text-xl md:text-4xl uppercase italic sub-spacing pl-[1.5em] drop-shadow-md whitespace-nowrap">歲 月 忽 已 晚 · 忠 義 永 留 芳</p>
                                <div className="hidden sm:block h-[1px] flex-1 max-w-[200px] bg-gradient-to-l from-transparent to-amber-500" />
                            </div>
                            <div className="max-w-5xl bg-amber-950/30 border-x-4 border-amber-500/40 p-12 backdrop-blur-xl mx-auto rounded-sm shadow-2xl">
                                <p className="text-amber-300 text-lg md:text-2xl leading-relaxed tracking-[0.3em] font-black italic font-serif">我們為休閒至情義幫，本譜只會依照單獨幾位老人的記憶，錄入有與幫會交流熱絡、曾共同遊玩，以及幫戰共同奮戰之人。</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[95rem] mx-auto px-12 -mt-48 relative z-30 pb-60 text-center">
                        <div className="space-y-64 inline-block w-full">
                            {Object.entries(groupedMembers).sort(([a], [b]) => parseInt(a) - parseInt(b)).map(([batch, batchMembers]) => (
                                <section key={batch} className="relative pt-32 w-full text-center">
                                    <div className="flex justify-center mb-36 relative z-[40]">
                                        <div className="relative cursor-pointer group" onClick={() => setExpandedBatches(p => ({ ...p, [batch]: !p[batch] }))}>
                                            <div className="bg-[#a00000] text-[#fffdeb] w-52 h-52 flex items-center justify-center rounded-sm shadow-[0_50px_100px_rgba(0,0,0,1)] border-[10px] border-double border-[#600000] transform transition-all group-hover:scale-125">
                                                <div className="text-center font-black">
                                                    <div className="text-sm opacity-90 tracking-[0.4em] mb-3 uppercase font-bold text-amber-200">江湖世代</div>
                                                    <div className="text-7xl glow-text">第{batch}批</div>
                                                    <div className="text-lg opacity-100 mt-3 font-serif tracking-[0.6em] text-amber-200">傳承錄</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    {expandedBatches[batch] && (
                                        <div className="space-y-56 relative mt-24 text-left">
                                            <div className="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-[3px] bg-gradient-to-b from-amber-400/50 via-amber-400/10 to-transparent hidden md:block" />
                                            {batchMembers.map((member, idx) => (
                                                <div key={member.id} className={`flex flex-col md:flex-row items-center md:items-start gap-24 ${idx % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} relative z-10`}>
                                                    <div className="w-full md:w-[65%] group relative">
                                                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-[90%] h-[3px] bg-amber-400/50 rounded-full glow-text" />
                                                        <div className="bg-[#1a1714] p-16 md:p-20 border-x-4 border-amber-600/40 shadow-[0_60px_120px_-20px_rgba(0,0,0,1)] relative overflow-hidden rounded-xl group-hover:border-amber-400 transition-all duration-700">
                                                            <div className="absolute -bottom-16 -right-16 text-[15rem] opacity-[0.05] pointer-events-none font-black text-amber-400 italic select-none">{member.jobClass}</div>
                                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 border-b-4 border-amber-500/20 pb-12 relative z-10">
                                                                <div className="mb-8 md:mb-0">
                                                                    <div className="flex items-center gap-8 mb-6">
                                                                        <h3 className="text-6xl md:text-8xl font-black text-amber-100 tracking-widest glow-text">{member.name}</h3>
                                                                        <span className="bg-[#c00000] text-white text-sm px-6 py-2 font-black tracking-[0.5em] shadow-2xl border-2 border-amber-400/30">世代：{member.batch}</span>
                                                                    </div>
                                                                    <div className="flex flex-wrap items-center gap-12 text-amber-400 font-black tracking-[0.5em] text-lg uppercase">
                                                                        <span className="flex items-center gap-4"><Shield size={28} className="text-amber-500" />曾任：{member.position}</span>
                                                                        <span className="flex items-center gap-4"><Crosshair size={28} className="text-amber-500" />流派：{member.jobClass}</span>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-8">
                                                                    <button onClick={() => { setFormData(member); setEditingId(member.id); setIsAdding(true); }} className="p-5 bg-amber-500/20 hover:bg-amber-400 hover:text-black rounded-lg transition-all shadow-xl border-2 border-amber-500/30"><Edit2 size={32}/></button>
                                                                    <div className="relative">
                                                                        {confirmDeleteId === member.id && (
                                                                            <div className="absolute bottom-full right-0 mb-4 flex flex-col items-end gap-4 animate-in slide-in-from-bottom-2 duration-200">
                                                                                <div className="bg-[#c00000] text-white p-5 text-base font-black tracking-widest whitespace-nowrap border-4 border-[#800000] shadow-3xl rounded-md">確定抹除這段記憶？</div>
                                                                                <div className="flex gap-4">
                                                                                    <button onClick={() => executeDelete(member.id)} className="bg-red-500 text-white px-8 py-3 text-sm font-black hover:bg-red-400 transition-colors shadow-2xl">確定</button>
                                                                                    <button onClick={() => setConfirmDeleteId(null)} className="bg-slate-700 text-white px-8 py-3 text-sm font-black hover:bg-slate-600 transition-colors shadow-2xl">取消</button>
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                        <button onClick={() => setConfirmDeleteId(member.id)} className={`p-5 rounded-lg transition-all border-2 ${confirmDeleteId === member.id ? 'bg-red-600 border-red-400 text-white' : 'bg-amber-500/10 border-amber-500/20 hover:bg-red-600 hover:text-white'}`}><Trash2 size={32}/></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                            <div className="relative mb-16 pl-12">
                                                                <div className="absolute left-0 top-0 bottom-0 w-[5px] bg-gradient-to-b from-amber-400 via-transparent to-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.5)]" />
                                                                <p className="text-amber-50 text-3xl md:text-5xl leading-[3] italic font-serif tracking-wider drop-shadow-lg">「{member.description || '隱 世 高 人，未 曾 留 下 隻 言 片 語。'}」</p>
                                                            </div>
                                                            <div className="text-lg text-amber-400 font-black uppercase tracking-[0.8em] pt-12 border-t-2 border-amber-500/20 flex items-center gap-6"><History size={28} className="text-amber-500" /> 活躍時期：{member.period || '不詳'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="w-full md:w-[35%] mt-16 md:mt-32">
                                                        <div className="aspect-[3/4] bg-black border-[24px] border-[#1e1a16] shadow-[0_80px_160px_-40px_rgba(0,0,0,1)] relative overflow-hidden rounded-sm group/img">
                                                            {member.imageUrl ? <img src={member.imageUrl} className="w-full h-full object-cover opacity-60 grayscale-[0.5] group-hover/img:grayscale-0 group-hover/img:opacity-100 transition-all duration-1000 scale-110 group-hover/img:scale-100" alt={member.name} /> : <div className="w-full h-full flex flex-col items-center justify-center text-amber-400/20"><Ghost size={160} className="mb-12 opacity-40" /><span className="text-2xl tracking-[2em] font-black uppercase text-center px-4">影跡全無</span></div>}
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-80" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            ))}
                        </div>
                        <button onClick={() => setIsAdding(true)} className="fixed bottom-28 right-28 w-32 h-32 md:w-40 md:h-40 bg-[#0d4d30] text-emerald-50 border-8 border-emerald-700 shadow-[0_40px_100px_rgba(0,80,40,0.9)] flex items-center justify-center transition-all hover:scale-110 active:scale-95 z-[100] group rounded-full"><div className="text-center flex flex-col items-center"><Plus size={64} className="group-hover:rotate-180 transition-transform duration-700" /><div className="text-sm font-black tracking-[0.8em] uppercase mt-3">錄入</div></div></button>
                    </main>

                    {/* Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-8 bg-black/98 backdrop-blur-3xl text-left">
                            <div className="bg-[#1e1b18] border-[6px] border-amber-500/50 w-full max-w-6xl shadow-[0_0_200px_rgba(0,0,0,1)] rounded-sm p-16 md:p-24 max-h-[95vh] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-20 border-b-4 border-amber-500/30 pb-16">
                                    <h2 className="text-5xl md:text-7xl font-black tracking-[1.2em] text-amber-400 uppercase flex items-center gap-12"><Compass size={72} className="animate-spin-slow" />{editingId ? '重 修 史 冊' : '新 俠 登 錄'}</h2>
                                    <button onClick={resetForm} className="text-amber-700 hover:text-amber-400 transition-all hover:rotate-90 duration-500"><X size={80} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-20">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-20">
                                        <div className="space-y-8"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">俠 客 名 諱</label><input required className="w-full bg-transparent border-b-4 border-amber-500/20 p-8 text-5xl outline-none focus:border-amber-400 text-amber-50 glow-text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                        <div className="space-y-8"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">所 屬 流 派</label><select className="w-full bg-black/60 border-b-4 border-amber-500/20 p-8 text-4xl outline-none focus:border-amber-400 cursor-pointer font-black text-amber-50" value={formData.jobClass} onChange={e => setFormData({...formData, jobClass: e.target.value})}>{CLASSES.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-10"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black block text-center sm:text-left">江 湖 畫 像 (本地畫像)</label><div className="flex flex-col md:flex-row gap-12 p-8 border-4 border-amber-500/20 bg-black/40 rounded-xl"><input placeholder="外部畫像網址..." className="flex-1 bg-transparent border-b-2 border-amber-500/30 p-6 text-2xl italic text-amber-100 outline-none" value={formData.imageUrl} onChange={e => setFormData({...formData, imageUrl: e.target.value})} /><input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={handleImageUpload} /><button type="button" onClick={() => fileInputRef.current?.click()} className="px-16 py-6 border-4 border-amber-500/50 text-xl font-black uppercase hover:bg-amber-500/30 transition-all text-amber-400">{isCompressing ? '凝氣中...' : '選取本地畫像'}</button></div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-20">
                                        <div className="space-y-8"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">傳 承 代 數</label><input type="number" min="1" className="w-full bg-transparent border-b-4 border-amber-500/20 p-8 text-5xl outline-none focus:border-amber-400 text-amber-50 font-black" value={formData.batch} onChange={e => setFormData({...formData, batch: parseInt(e.target.value) || 1})} /></div>
                                        <div className="space-y-8"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">曾 任 職 位</label><select className="w-full bg-black/60 border-b-4 border-amber-500/20 p-8 text-4xl outline-none focus:border-amber-400 cursor-pointer font-black text-amber-50" value={formData.position} onChange={e => setFormData({...formData, position: e.target.value})}>{POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                    </div>
                                    <div className="space-y-8"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">活 躍 時 期</label><input className="w-full bg-transparent border-b-4 border-amber-500/20 p-8 text-4xl outline-none focus:border-amber-400 text-amber-50 font-black" value={formData.period} onChange={e => setFormData({...formData, period: e.target.value})} /></div>
                                    <div className="space-y-10"><label className="text-xl text-amber-500 uppercase tracking-[1.2em] font-black">江 湖 誌 異</label><textarea rows="6" className="w-full bg-black/50 border-4 border-amber-500/20 p-12 text-3xl italic font-serif leading-[2.5] outline-none focus:border-amber-400 text-amber-50 shadow-inner rounded-md" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} /></div>
                                    <button 
                                        type="submit" 
                                        disabled={isSaving}
                                        className={`w-full py-12 bg-[#a00000] text-[#fff6d1] font-black tracking-[3em] border-8 border-double border-[#700000] shadow-[0_40px_100px_rgba(0,0,0,0.8)] transition-all transform text-5xl uppercase text-center ${isSaving ? 'opacity-50 cursor-not-allowed' : 'hover:bg-[#800000] hover:-translate-y-3'}`}
                                    >
                                        {isSaving ? '凝 氣 成 書...' : '落 筆 成 書'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Footer - 極致輝煌與防斷行校準 */}
                    <footer className="max-w-[95rem] mx-auto mt-80 px-12 pb-60 text-center relative z-10 w-full flex flex-col items-center">
                        <div className="h-[4px] w-full bg-gradient-to-r from-transparent via-amber-400/80 to-transparent mb-24" />
                        <p className="text-4xl md:text-6xl font-black text-amber-400 font-serif text-center w-full sub-spacing pl-[1.5em] mb-16 glow-text whitespace-nowrap overflow-visible">江 湖 路 遠 · 終 會 在 遇</p>
                        <p className="text-xl md:text-3xl tracking-[1em] mb-10 uppercase font-black text-amber-500 text-center w-full pl-[1em]">《隱泉水榭幫會傳承錄》· 軍師親筆 🖋️</p>
                        <p className="text-lg md:text-xl tracking-[0.5em] font-black italic text-amber-600 text-center w-full block mb-24 opacity-100">自古英雄如美人 · 不許人間見白頭</p>
                        
                        <div className="flex items-center gap-10 p-10 border-4 border-amber-400/40 bg-amber-950/20 rounded-lg shadow-3xl">
                            <div className={`w-6 h-6 rounded-full ${user ? 'bg-emerald-400 shadow-[0_0_25px_#34d399]' : 'bg-red-500 shadow-[0_0_25px_#ef4444]'}`} />
                            <div className="text-amber-400 text-base md:text-xl tracking-[0.6em] uppercase font-black">
                                俠客靈壓：{user ? user.uid : "靈脈尚未覺醒"}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
